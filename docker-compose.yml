services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-copilot-postgres
    environment:
      POSTGRES_DB: trading_copilot
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: trading-copilot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tradingcopilot.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trading-copilot-api
    env_file:
      - apps/api/.env.example
    environment:
      DATABASE_URL: postgresql://trading:trading_password@postgres:5432/trading_copilot?schema=public
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trading-copilot-web
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
